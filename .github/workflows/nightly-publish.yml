name: Nightly Publish

on:
  workflow_call:
    inputs:
      repo-name:
        type: string
        required: true
      build-platform:
        type: string
        default: ubuntu-latest
      org-name:
        type: string
        default: 51degrees
      user:
        type: string
        default: Automation51D
      email:
        type: string
        default: "51DCI@51Degrees.com"
      dryrun:
        type: boolean
        default: false
      cache-assets:
        type: boolean
        default: false
      common-ci-ref:
        type: string
        default: ''
      skip-compare-performance:
        type: boolean
        default: false
      # If set, runs the pack-and-consume smoke matrix after Test and before
      # Package. Opt-in — leave empty to skip. Use the package id that ships
      # native DLLs via runtimes/{rid}/native/ and a .targets file.
      smoke-package-id:
        type: string
        default: ''
      smoke-modern-tfm:
        type: string
        default: 'net10.0'
      smoke-native-asset-name:
        type: string
        default: ''
    secrets:
      # PAT that we use to authenticate on behalf of GitHub Actions.
      token:
        required: true
      AcceptCHBrowserKey:
      AcceptCHHardwareKey:
      AcceptCHNoneKey:
      AcceptCHPlatformKey:
      ApiKey:
      CodeSigningKeyVaultName:
      CodeSigningKeyVaultUrl:
      CodeSigningKeyVaultClientId:
      CodeSigningKeyVaultTenantId:
      CodeSigningKeyVaultClientSecret:
      CodeSigningKeyVaultCertificateName:
      CodeSigningKeyVaultCertificateData:
      CsvUrl:
      DeviceDetection:
      DeviceDetectionUrl:
      IpIntelligence:
      IpIntelligenceUrl:
      JavaGpgKeyPassphrase:
      JavaPGP:
      MavenSettings:
      NPMAuthToken:
      NginxCert:
      NginxKey:
      NginxJwtToken:
      PypiToken:
      TestBrowserResourceKey:
      TestHardwareResourceKey:
      TestLicenseKey:
      TestNoSetHeaderResourceKey:
      TestPlatformResourceKey:
      TestPypiToken:
      TestResourceKey:
      TestSuperResourceKey:
      UsePublishTests:
      WordpressSvnUrl:
      WordpressSvnUser:
      WordpressSvnPassword:
      DockerPassword:
      DockerContainer:
      DockerRegistry:
      DockerUser:
      PearlLicense:

defaults:
  run:
    shell: pwsh

jobs:
  Configure:
    runs-on: ubuntu-latest
    outputs:
      asset_cache_key: ${{ steps.prefetch-assets.outputs.cache-key }}
      options: ${{ steps.configure.outputs.options }}
      runperformance: ${{ steps.configure.outputs.runperformance }}
      version: ${{ steps.configure.outputs.version }}
      update_required: ${{ steps.configure.outputs.update_required }}
    steps:
      - name: Checkout Common
        uses: actions/checkout@v6
        with:
          repository: ${{ inputs.org-name }}/common-ci
          ref: ${{ inputs.common-ci-ref }}

      - name: Install GitVersion
        run: |
          if (Get-Command dotnet-gitversion -ErrorAction SilentlyContinue) {
            Write-Host "GitVersion already installed."
          } else {
            Write-Host "Installing GitVersion..."
            dotnet tool install --global GitVersion.Tool --version '6.1'
          }

      - name: Configure
        id: configure
        run: |
          ./nightly-publish.configure.ps1 `
          -RepoName ${{ inputs.repo-name }} `
          -OrgName ${{ inputs.org-name }} `
          -Branch ${{ github.ref_name }} `
          -GitHubToken ${{ secrets.token }} `
          -GitHubOutput $Env:GITHUB_OUTPUT `
          -GitHubUser ${{ inputs.user }} `
          -GitHubEmail ${{ inputs.email }} `
          -BuildPlatform ${{ inputs.build-platform }}

      - name: Prefetch assets
        id: prefetch-assets
        if: inputs.cache-assets
        uses: ./.github/actions/prefetch_assets
        with:
          repo: ${{ inputs.repo-name }}
          secrets: ${{ toJSON(secrets) }}

  PreBuild:
    needs: Configure
    strategy:
      matrix:
        options: ${{ fromJSON(needs.configure.outputs.options ) }}
    name: Pre Build - ${{ matrix.options.name }}
    runs-on: ${{ matrix.options.image }}
    steps:
      - name: Checkout Common
        uses: actions/checkout@v6
        if: ${{ matrix.options.packagerequirement }}
        with:
          repository: ${{ inputs.org-name }}/common-ci
          ref: ${{ inputs.common-ci-ref }}

      - name: Install Runtime
        if: matrix.options.Language != '' && matrix.options.LanguageVersion != ''
        uses: ./.github/actions/install_runtime
        with:
          language: ${{ matrix.options.Language }}
          version: ${{ matrix.options.LanguageVersion }}

      - name: PreBuild
        if: ${{ matrix.options.packagerequirement }}
        env:
          SECRETS: ${{ toJSON(secrets) }}
        run: |
          $DryRun = [bool]::Parse( "${{ inputs.dryrun }}" )
          $Options = $(ConvertFrom-Json -AsHashtable '${{ toJSON(matrix.options) }}')
          $Options.Add("Keys", $(ConvertFrom-Json -AsHashtable $env:SECRETS))
          ./nightly-publish.prebuild.ps1 `
          -RepoName ${{ inputs.repo-name }} `
          -OrgName ${{ inputs.org-name }} `
          -Branch ${{ github.ref_name }} `
          -GitHubToken ${{ secrets.token }} `
          -Options $Options `
          -GitHubUser ${{ inputs.user }} `
          -GitHubEmail ${{ inputs.email }} `
          -DryRun $DryRun

      - name: Upload Package Artifact
        uses: actions/upload-artifact@v7
        if: ${{ success() && matrix.options.packagerequirement }}
        with:
          name: package_${{ matrix.options.name }}
          path: ${{ github.workspace }}/package-files
          if-no-files-found: ignore
          include-hidden-files: true


  Build:
    runs-on: ${{ inputs.build-platform }}
    needs: [ PreBuild, Configure ]
    steps:
      - name: Checkout Common
        uses: actions/checkout@v6
        with:
          repository: ${{ inputs.org-name }}/common-ci
          ref: ${{ inputs.common-ci-ref }}

      - name: Download Package Artifacts
        if: ${{ success() }}
        uses: actions/download-artifact@v8
        with:
          pattern: package_*
          path: ${{ github.workspace }}/package-files

      - name: Build
        env:
          SECRETS: ${{ toJSON(secrets) }}
        run: |
          $DryRun = [bool]::Parse( "${{ inputs.dryrun }}" )
          $Options = @{}
          $Options.Add("Keys", $(ConvertFrom-Json -AsHashtable $env:SECRETS))
          $Options.Add("Version", "${{ needs.configure.outputs.version }}")
          ./nightly-publish.build.ps1 `
          -RepoName ${{ inputs.repo-name }} `
          -OrgName ${{ inputs.org-name }} `
          -Branch ${{ github.ref_name }} `
          -GitHubToken ${{ secrets.token }} `
          -Options $Options `
          -GitHubUser ${{ inputs.user }} `
          -GitHubEmail ${{ inputs.email }} `
          -DryRun $DryRun

      - name: Upload Package Artifact
        uses: actions/upload-artifact@v7
        if: ${{ success() }}
        with:
          name: package
          path: ${{ github.workspace }}/package
          if-no-files-found: ignore
          include-hidden-files: true


  Test:
    needs: [ Build, Configure ]
    strategy:
      matrix:
        options: ${{ fromJSON(needs.configure.outputs.options ) }}
    name: Test - ${{ matrix.options.name }}
    runs-on: ${{ matrix.options.image }}
    timeout-minutes: 120

    steps:
      - name: Checkout Common
        if: ${{ matrix.options.packagerequirement }}
        uses: actions/checkout@v6
        with:
          repository: ${{ inputs.org-name }}/common-ci
          ref: ${{ inputs.common-ci-ref }}

      - name: Download Package Artifact
        if: ${{ success() && matrix.options.packagerequirement }}
        uses: actions/download-artifact@v8
        with:
          name: package
          path: ${{ github.workspace }}/package

      - name: Install Runtime
        if: matrix.options.Language != '' && matrix.options.LanguageVersion != ''
        uses: ./.github/actions/install_runtime
        with:
          language: ${{ matrix.options.Language }}
          version: ${{ matrix.options.LanguageVersion }}

      - name: Restore Asset Cache
        if: needs.configure.outputs.asset_cache_key
        uses: actions/cache/restore@v5
        with:
          key: ${{ needs.configure.outputs.asset_cache_key }}
          path: assets
          enableCrossOsArchive: true

      - name: Test
        if: ${{ success() && matrix.options.packagerequirement }}
        env:
          SECRETS: ${{ toJSON(secrets) }}
        run: |
          $DryRun = [bool]::Parse( "${{ inputs.dryrun }}" )
          $Options = $(ConvertFrom-Json -AsHashtable '${{ toJSON(matrix.options) }}')
          $Options.Add("Keys", $(ConvertFrom-Json -AsHashtable $env:SECRETS))
          ./nightly-publish.test.ps1 `
          -RepoName ${{ inputs.repo-name }} `
          -OrgName ${{ inputs.org-name }} `
          -Branch ${{ github.ref_name }} `
          -GitHubToken ${{ secrets.token }} `
          -Options $Options `
          -GitHubUser ${{ inputs.user }} `
          -GitHubEmail ${{ inputs.email }} `
          -DryRun $DryRun

      - name: Upload Performance Results Artifact
        uses: actions/upload-artifact@v7
        if: ${{ matrix.options.RunPerformance }}
        with:
          name: performance_results-publish-${{ matrix.options.name }}
          path: ${{ inputs.repo-name }}/test-results/performance-summary/results_*.json

      - name: Publish Test Results
        if: ${{ !cancelled() && matrix.options.packagerequirement }}
        uses: ./.github/actions/publish_test_results
        with:
          repo-name: ${{ inputs.repo-name }}
          name: ${{ matrix.options.name }}
          skip-unit: true
          skip-performance: true

  ComparePerformance:
    runs-on: ubuntu-latest
    if: ${{ !inputs.skip-compare-performance && needs.Configure.outputs.runperformance }}
    needs: [Configure, Test]
    steps:
      - name: Checkout Common
        uses: actions/checkout@v6
        with:
          repository: ${{ inputs.org-name }}/common-ci
          ref: ${{ inputs.common-ci-ref }}

      - name: Download Performance Results Artifact
        uses: actions/download-artifact@v8
        with:
          pattern: performance_results-publish-*
          merge-multiple: true

      - name: Compare Performance
        continue-on-error: true
        run: |
          ./nightly-publish.compare-performance.ps1 `
          -RepoName '${{ inputs.repo-name }}' `
          -OrgName '${{ inputs.org-name }}' `
          -Branch '${{ github.ref_name }}' `
          -GitHubToken '${{ secrets.token }}' `
          -GitHubOutput $Env:GITHUB_OUTPUT `
          -Options (ConvertFrom-Json -AsHashtable '${{ needs.Configure.outputs.options }}') `
          -RunId '${{ github.run_id }}' `
          -GitHubUser '${{ inputs.user }}' `
          -GitHubEmail '${{ inputs.email }}' `
          -DryRun ([bool]::Parse('${{ inputs.dryrun }}'))

      - name: Escape Branch Name
        id: escape_branch
        run: |
          "name=" + $env:GITHUB_REF_NAME -replace '[":<>|*?/\\\r\n]', '-' | Out-File $env:GITHUB_OUTPUT -Append

      - name: Upload Performance Results Artifact
        uses: actions/upload-artifact@v7
        with:
          name: publish_performance_results@${{ steps.escape_branch.outputs.name }} # https://github.com/actions/upload-artifact/issues/22
          path: ${{ github.workspace }}/results_*.json
          if-no-files-found: ignore
          include-hidden-files: true

  Smoke:
    name: Pack-Consume Smoke
    needs: [Configure, Build, Test]
    if: >
      !cancelled() && inputs.smoke-package-id != '' &&
      needs.Test.result == 'success'
    uses: ./.github/workflows/pack-consume-smoke.yml
    with:
      org-name: ${{ inputs.org-name }}
      common-ci-ref: ${{ inputs.common-ci-ref }}
      package-id: ${{ inputs.smoke-package-id }}
      package-version: ${{ needs.Configure.outputs.version }}
      nupkg-artifact-name: package
      modern-tfm: ${{ inputs.smoke-modern-tfm }}
      native-asset-name: ${{ inputs.smoke-native-asset-name }}

  Package:
    runs-on: ${{ inputs.build-platform }}
    needs: [Configure, Test, ComparePerformance, Smoke]
    if: >
      !cancelled() && needs.Configure.outputs.update_required == 'true' &&
      needs.Test.result == 'success' &&
      (needs.ComparePerformance.result == 'success' || needs.ComparePerformance.result == 'skipped') &&
      (needs.Smoke.result == 'success' || needs.Smoke.result == 'skipped')
    steps:
      - name: Checkout Common
        uses: actions/checkout@v6
        with:
          repository: ${{ inputs.org-name }}/common-ci
          ref: ${{ inputs.common-ci-ref }}

      - name: Download Package Artifact
        if: ${{ success() }}
        uses: actions/download-artifact@v8
        with:
          name: package
          path: ${{ github.workspace }}/package

      - name: Package
        if: ${{ success() }}
        env:
          SECRETS: ${{ toJSON(secrets) }}
        run: |
          $DryRun = [bool]::Parse( "${{ inputs.dryrun }}" )
          $Options = @{}
          $Options.Add("Keys", $(ConvertFrom-Json -AsHashtable $env:SECRETS))
          $Options.Add("Version", "${{ needs.configure.outputs.version }}")
          ./nightly-publish.package.ps1 `
          -RepoName ${{ inputs.repo-name }} `
          -OrgName ${{ inputs.org-name }} `
          -Branch ${{ github.ref_name }} `
          -GitHubToken ${{ secrets.token }} `
          -Options $Options `
          -GitHubUser ${{ inputs.user }} `
          -GitHubEmail ${{ inputs.email }} `
          -DryRun $DryRun
